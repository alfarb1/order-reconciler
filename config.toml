# KNET Reconciler config. Safe to commit (no secrets).

[knet]
# These lines are used to confirm a retailer email was actually shipped TO KNET.
# Match is case-insensitive and whitespace-tolerant. At least one must appear in
# the email body for the email to count as outbound-to-KNET.
#
# IMPORTANT: don't use short strings like "KNET" — they false-match inside
# URL-encoded blobs and base64 junk (e.g. "knet" matched inside
# "...rknetefewehro..."). Use the actual street + city/zip from the shipping
# label so the match is anchored to an address block.
warehouse_address_lines = [
  "1709 Imperial Way",
  "West Deptford, NJ 08066",
  "West Deptford, New Jersey 08066",
]
sender_domain = "knetgroup.com"

[reconcile]
# Days after ship_date before a shipment without a receipt is flagged as missing
# (rather than 'pending / in transit').
stale_days = 14
# How far back to look when fetching emails. Mirrors the Gmail q= newer_than:Nd.
lookback_days = 180

[gmail]
# Override the default Gmail search queries if you need to.
# The outbound filter has to be permissive — Shopify-hosted boutiques send shipment
# notifications from `store+<id>@t.shopifyemail.com` with subjects like "A shipment
# from order #33720 is on the way", which never match the narrow noreply/shipped
# heuristics. False positives are cheap (the parser rejects them) but false negatives
# silently lose shipments.
outbound_query = "(subject:(shipped OR shipment OR \"your order\" OR \"order confirmation\" OR confirmed OR tracking OR dispatched OR \"on the way\" OR \"on its way\" OR \"out for delivery\" OR delivered) OR from:(noreply OR no-reply OR shipping OR orders OR shopifyemail OR shopify)) -from:knetgroup.com newer_than:180d"
knet_query = "from:knetgroup.com newer_than:180d"

[retailers]
# Force a specific parser for a sender domain when the generic parser misclassifies it.
# [[retailers.overrides]]
# from_domain = "shop.example.com"
# parser = "shopify"
